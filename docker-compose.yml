version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_local
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo_data:/data/db
      - ./dump_prod:/container_dump

volumes:
  mongo_data:
    driver: local
